name: Issue triage (Claude)

# Triage only: apply labels, post a status comment, and ask for any missing
# definition-of-ready info. NO code changes — see permissions below.
on:
  issues:
    types: [opened, edited]

# Hard safety boundary: read-only on repo contents means the action physically
# cannot push commits or modify code. `issues: write` is for labels + comments only.
permissions:
  contents: read
  issues: write
  id-token: write

# Avoid stacking runs if an issue is edited several times in quick succession.
concurrency:
  group: triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    # Only run for issues authored by the maintainer or other write-access users.
    # This repo is PUBLIC, so this gate stops strangers' issues from triggering paid runs.
    if: contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Triage with Claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true # <- temporary, for debugging
          prompt: |
            You are triaging GitHub issue #${{ github.event.issue.number }} for the
            "der · die · das" repo. Work only on this issue. Do exactly the steps below
            and nothing else. Do NOT read or inspect any files other than AGENTS.md.
            Do NOT look at ~/.claude, settings files, or the environment. Do NOT edit
            code, the issue title, or the issue body; do NOT open PRs.

            Use the `gh` CLI to act — actually run the commands, do not just describe them.

            Step 1 — Read the issue once:
              gh issue view ${{ github.event.issue.number }} --json title,body,labels,author

            Step 2 — Read AGENTS.md for the Definition of Ready, the deny-list, and the
            area taxonomy.

            Step 3 — Decide the labels:
              - type: `bug` or `enhancement` (usually already applied by the template)
              - `area:*` for each affected surface: scheduler, inference, db, session,
                sync, ui, pipeline, content, docs, tooling
              - exactly one of `risk:low` / `risk:med` / `risk:high`
              - if the issue touches a deny-list area (IndexedDB schema/migrations, FSRS
                grading, DynamoDB sync, secrets): apply `needs-maintainer`, and do NOT
                apply `agent-eligible` even if the reporter checked that box
              - otherwise, apply `agent-eligible` only if the reporter checked it
              - `ready` if every Definition-of-Ready field is filled; else `needs-info`

            Step 4 — Apply all chosen labels and remove needs-triage in ONE command:
              gh issue edit ${{ github.event.issue.number }} --add-label "label1,label2,..." --remove-label "needs-triage"

            Step 5 — Post exactly ONE concise comment:
              gh issue comment ${{ github.event.issue.number }} --body "..."
              The comment summarizes which Definition-of-Ready fields are present vs.
              missing, lists any missing info and asks the reporter for it, and prominently
              notes if the issue touches a deny-list area (maintainer-only).

            Step 6 — Stop. Take no further actions.
          # CLI-style flags. Cost cap + defense-in-depth: block all code-mutation/exec tools.
          # (Repo permissions already make pushes impossible; this narrows the surface further.)
          claude_args: |
            --max-turns 10
