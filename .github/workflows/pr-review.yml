name: PR review (Claude)

# Review only: post a review/comments against the AGENTS.md checklist.
# NO commits, NO merges — see permissions below.
on:
  pull_request:
    types: [opened, synchronize]

# Hard safety boundary: read-only on repo contents means the action physically
# cannot commit or merge. `pull-requests: write` is for review comments only.
permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only run for PRs from write-access authors. This repo is PUBLIC; note that
    # `pull_request` from a fork does NOT expose secrets, so external fork PRs will
    # simply not run (no OAuth token) — safe by default. This gate documents intent
    # and also skips bot/stranger PRs that happen to come from the base repo.
    if: contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Review with Claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} for the
            "der · die · das" repo. Work only on this PR. Do exactly the steps below
            and nothing else. Do NOT read or inspect any files other than AGENTS.md and
            the PR diff. Do NOT look at ~/.claude, settings files, or the environment.
            Do NOT edit code, commit, push, merge, or open/modify PRs — you review and
            comment only.

            Use the `gh` CLI to act — actually run the commands, do not just describe them.

            Step 1 — Read the PR metadata once:
              gh pr view ${{ github.event.pull_request.number }} --json title,body,labels,author,files

            Step 2 — Read the diff once:
              gh pr diff ${{ github.event.pull_request.number }}

            Step 3 — Read AGENTS.md (it is in the checked-out repo root) with the Read
            tool, for the "PR-review checklist (tuned for HIGH RECALL)" and the deny-list.

            Step 4 — Review strictly against that checklist. Bias toward flagging: if
            something is even slightly concerning, raise it — especially anything touching
            the data layer (db.js / review log), FSRS scheduling, IndexedDB schema/migrations,
            or the DynamoDB/Amplify sync boundary. A false alarm is cheap; a missed regression
            is not. Tag each finding with severity (🔴 blocker / 🟡 concern / 🟢 nit) and say
            plainly when you are unsure. If the diff touches a deny-list area, say so
            PROMINENTLY at the top and state that maintainer review is REQUIRED regardless of
            how clean the change looks.

            Step 5 — Post exactly ONE review comment with your full writeup, ending with an
            explicit recommendation ("request changes", "comment", or
            "looks good — maintainer decision"). Never imply approval of a deny-list change.

            Your writeup will contain Markdown backticks and other characters that the
            shell mangles inside a quoted --body argument. To avoid that entirely, write
            the body to a file with the Write tool, then post with --body-file:
              (Write tool) -> /tmp/pr-review.md
              gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr-review.md
            Do NOT post placeholder, test, or "in progress" comments — post the final
            review exactly once.

            Step 6 — Stop. Take no further actions.
          # CLI-style flags. Cost cap + defense-in-depth: whitelist ONLY what this job
          # needs — the gh read+comment commands, reading AGENTS.md, and writing the
          # review body to a temp file for --body-file (which sidesteps the shell-quoting
          # trap that backtick-laden Markdown hits in a `gh pr comment --body "..."` arg).
          # Not-disallowing is not the same as allowing — with this allowlist the agent
          # still cannot edit tracked code, commit, merge, push, or run other commands.
          # (`gh pr comment` is used rather than `gh pr review` because the latter rejects
          # reviewing your own PR, which the author gate would commonly produce.)
          claude_args: |
            --max-turns 20
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(cat:*),Read,Write"
